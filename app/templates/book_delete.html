{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-trash"></i> حذف کتاب</h2>
    <a href="/books/landing" class="btn btn-primary">بازگشت</a>
</div>

<div class="form-card" style="text-align: center;">
    <p style="font-size: 1.2rem; margin-bottom: 20px;">
        آیا مطمئن هستید که می‌خواهید کتاب زیر را حذف کنید؟
    </p>
    <p style="font-size: 1.1rem; color: #e74c3c; margin-bottom: 30px;">
        <strong>{{ book.title }}</strong> - {{ book.author }}
    </p>

    <form method="post" action="/books/delete/{{ book.isbn }}">
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash"></i> بله، حذف کن
        </button>
        <a href="/books/landing" class="btn btn-primary" style="margin-right: 10px;">
            انصراف
        </a>
    </form>
</div>
{% endblock %}
