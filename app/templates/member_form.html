{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2>
        {% if action == "add" %}
            <i class="fas fa-plus"></i> افزودن عضو
        {% else %}
            <i class="fas fa-edit"></i> ویرایش عضو
        {% endif %}
    </h2>
    <a href="/members/landing" class="btn btn-primary">بازگشت</a>
</div>

<div class="form-card">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    {% if action == "add" %}
    <form method="post" action="/members/">
    {% else %}
    <form method="post" action="/members/{{ member.member_id }}">
    {% endif %}

        <div class="form-group">
            <label>نام</label>
            <input type="text" name="name" required
                value="{{ member.name if member else '' }}">
        </div>

        <div class="form-group">
            <label>ایمیل</label>
            <input type="email" name="email" required
                value="{{ member.email if member else '' }}">
        </div>

        <div class="form-group">
            <label>تلفن</label>
            <input type="text" name="phone" required
                value="{{ member.phone if member else '' }}">
        </div>

        <button type="submit" class="btn btn-success">
            {% if action == "add" %}ثبت عضو{% else %}ذخیره تغییرات{% endif %}
        </button>
    </form>
</div>
{% endblock %}
